<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CultureCompass — Discover & Connect</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f232c;
    --line: #2a2f3a;
    --text: #e9ecf1;
    --muted: #9aa3b2;
    --accent: #e8a13a;
    --accent-2: #d95b43;
    --good: #4bb98a;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 70% -10%, #232838 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.55;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 32px 20px 80px; }
  header.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .logo {
    width: 38px; height: 38px; border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; font-size: 20px;
  }
  h1 { font-size: 26px; margin: 0; letter-spacing: -0.5px; }
  .sub { color: var(--muted); margin: 4px 0 28px; font-size: 15px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .step-label {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent); font-weight: 700; margin-bottom: 14px;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; background: var(--panel-2); border: 1px solid var(--line);
    color: var(--text); border-radius: 10px; padding: 11px 12px; font-size: 14px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 60px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  .field { margin-bottom: 14px; }

  button.primary {
    margin-top: 8px; width: 100%; padding: 14px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #1a1206; font-weight: 700; font-size: 15px; border-radius: 12px;
    transition: transform .08s ease, filter .2s;
  }
  button.primary:hover { filter: brightness(1.06); }
  button.primary:active { transform: translateY(1px); }
  button.primary:disabled { opacity: .6; cursor: wait; }

  .dest-card {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px; cursor: pointer; transition: border-color .18s, transform .12s;
  }
  .dest-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .dest-name { font-size: 18px; font-weight: 700; margin: 0 0 2px; }
  .dest-tag { color: var(--accent); font-size: 13px; margin-bottom: 10px; }
  .dest-why { font-size: 14px; color: var(--text); }
  .chips { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 11px; background: #262b36; color: var(--muted);
    padding: 4px 9px; border-radius: 20px; }
  .season { font-size: 12px; color: var(--muted); margin-top: 8px; }

  .passport-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    flex-wrap: wrap; border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 4px;
  }
  .passport-head h2 { margin: 0; font-size: 24px; }
  .section { border-top: 1px solid var(--line); padding: 18px 0; }
  .section:first-of-type { border-top: none; }
  .sec-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 700; margin: 0 0 10px;
  }
  .sec-icon { font-size: 18px; }
  .attraction { padding: 8px 0; border-bottom: 1px dashed var(--line); }
  .attraction:last-child { border-bottom: none; }
  .attraction b { color: var(--text); }
  .attraction span { color: var(--muted); font-size: 14px; }
  .gem, .connect-box {
    background: linear-gradient(135deg, rgba(232,161,58,.08), rgba(217,91,67,.06));
    border: 1px solid #3a3220; border-radius: 12px; padding: 14px;
  }
  .story-narrative { white-space: pre-line; color: #dfe4ec; font-size: 15px; }
  .intro-msg {
    background: var(--bg); border: 1px solid var(--line); border-left: 3px solid var(--good);
    border-radius: 8px; padding: 12px; margin-top: 10px; font-size: 14px; font-style: italic;
    color: #cfe8dc;
  }
  .copy-btn {
    margin-top: 8px; background: transparent; border: 1px solid var(--good); color: var(--good);
    padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;
  }
  ul.etq { margin: 0; padding-left: 18px; color: var(--muted); font-size: 14px; }
  ul.etq li { margin-bottom: 5px; }

  .loading { text-align: center; padding: 40px 0; color: var(--muted); }
  .spinner {
    width: 34px; height: 34px; border: 3px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; margin: 0 auto 14px; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none; }
  .banner {
    font-size: 12px; color: var(--muted); background: var(--panel-2);
    border: 1px dashed var(--line); border-radius: 8px; padding: 8px 12px; margin-bottom: 16px;
  }
  .back { background: none; border: none; color: var(--accent); cursor: pointer;
    font-size: 13px; padding: 0; margin-bottom: 14px; }
  .persona {
    background: linear-gradient(135deg, rgba(232,161,58,.14), rgba(217,91,67,.10));
    border: 1px solid #3a3220; border-radius: 14px; padding: 16px 18px; margin-bottom: 12px;
  }
  .persona-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
  .persona-name { font-size: 22px; font-weight: 800; margin: 4px 0; letter-spacing: -0.4px; }
  .persona-desc { color: #dfe4ec; font-size: 14px; }
  .analysis { color: var(--muted); font-size: 14px; font-style: italic; margin-bottom: 16px; padding: 0 2px; }
  .learn-list { margin: 8px 0 4px; padding-left: 18px; font-size: 14px; }
  .learn-list li { margin-bottom: 4px; }
  .meta-row { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .phrase { padding: 6px 0; border-bottom: 1px dashed var(--line); font-size: 14px; }
  .phrase:last-child { border-bottom: none; }
  .phrase b { color: var(--accent); }
  .tip-box { background: var(--panel-2); border-left: 3px solid var(--accent); border-radius: 8px;
    padding: 12px 14px; font-size: 14px; }
  @media (max-width: 620px) { .grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <header class="brand">
    <div class="logo">🧭</div>
    <div>
      <h1>CultureCompass</h1>
    </div>
  </header>
  <p class="sub">Don't just visit — discover the right destination, then connect with its living culture. Powered by Generative AI.</p>

  <!-- STEP 1: Preferences -->
  <section id="step-prefs" class="card">
    <div class="step-label">Step 1 · Tell us about you</div>
    <div class="field">
      <label>What kind of experiences move you?</label>
      <textarea id="interests" placeholder="e.g. history & old architecture, street food, live music, meeting artisans, quiet nature...">history and old architecture, local food, meeting artisans</textarea>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Budget</label>
        <select id="budget">
          <option>Shoestring / backpacker</option>
          <option selected>Mid-range</option>
          <option>Comfort / premium</option>
        </select>
      </div>
      <div class="field">
        <label>Trip length</label>
        <select id="tripLength">
          <option>Weekend (2–3 days)</option>
          <option selected>About a week</option>
          <option>Two weeks or more</option>
        </select>
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>When are you travelling?</label>
        <select id="season">
          <option>Spring</option>
          <option selected>Summer</option>
          <option>Autumn</option>
          <option>Winter</option>
          <option>Not sure yet — flexible</option>
        </select>
      </div>
      <div class="field">
        <label>Travel style</label>
        <select id="travelStyle">
          <option selected>Solo</option>
          <option>Couple</option>
          <option>Family</option>
          <option>Friends</option>
        </select>
      </div>
    </div>
    <button class="primary" id="discoverBtn">✨ Discover my destinations</button>
  </section>

  <!-- STEP 2: Discovery results -->
  <section id="step-discover" class="card hidden">
    <button class="back" onclick="reset()">← Start over</button>
    <div class="step-label">Step 2 · Destinations that fit you</div>
    <div id="discoverBanner"></div>
    <div id="personaBox"></div>
    <div id="analysisBox"></div>
    <div id="destList" style="display:grid; gap:14px;"></div>
  </section>

  <!-- STEP 3: Cultural passport -->
  <section id="step-passport" class="card hidden">
    <button class="back" onclick="showDiscover()">← Back to destinations</button>
    <div id="passportBanner"></div>
    <div id="passport"></div>
  </section>

  <!-- Loading -->
  <section id="loading" class="card hidden">
    <div class="loading">
      <div class="spinner"></div>
      <div id="loadingText">Consulting the compass…</div>
    </div>
  </section>
</div>

<script>
  let currentPrefs = null;
  let lastDestinations = null;

  const $ = (id) => document.getElementById(id);
  function show(id) {
    ["step-prefs","step-discover","step-passport","loading"].forEach(s => $(s).classList.add("hidden"));
    $(id).classList.remove("hidden");
  }
  function reset() { show("step-prefs"); }
  function showDiscover() { show("step-discover"); }

  function collectPrefs() {
    return {
      interests: $("interests").value.trim() || "culture and food",
      budget: $("budget").value,
      tripLength: $("tripLength").value,
      season: $("season").value,
      travelStyle: $("travelStyle").value,
    };
  }

  $("discoverBtn").addEventListener("click", async () => {
    currentPrefs = collectPrefs();
    $("loadingText").textContent = "Finding destinations that fit you…";
    show("loading");
    try {
      const res = await fetch("/api/discover", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(currentPrefs),
      });
      const data = await res.json();
      renderDiscovery(data);
    } catch (e) {
      alert("Something went wrong reaching the compass. Please try again.");
      reset();
    }
  });

  function renderDiscovery(data) {
    lastDestinations = data.destinations || [];
    $("discoverBanner").innerHTML = data._fallback
      ? '<div class="banner">⚠️ Live AI was unreachable — showing curated demo destinations.</div>' : "";
    const persona = data.persona || {};
    $("personaBox").innerHTML = persona.name
      ? `<div class="persona"><div class="persona-tag">Your traveller persona</div>
         <div class="persona-name">🏷 ${esc(persona.name)}</div>
         <div class="persona-desc">${esc(persona.description||"")}</div></div>` : "";
    $("analysisBox").innerHTML = data.analysis
      ? `<div class="analysis">🧠 ${esc(data.analysis)}</div>` : "";
    const list = $("destList");
    list.innerHTML = "";
    lastDestinations.forEach((d) => {
      const el = document.createElement("div");
      el.className = "dest-card";
      el.innerHTML = `
        <div class="dest-name">${esc(d.name)}</div>
        <div class="dest-tag">${esc(d.tagline || "")}</div>
        <div class="dest-why">${esc(d.why_you || "")}</div>
        ${d.best_season ? `<div class="season">🗓 Best time: ${esc(d.best_season)}</div>` : ""}
        <div class="chips">${(d.vibe_tags||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join("")}</div>
      `;
      el.addEventListener("click", () => buildPassport(d.name));
      list.appendChild(el);
    });
    show("step-discover");
  }

  async function buildPassport(destination) {
    $("loadingText").textContent = `Crafting your Cultural Passport for ${destination}…`;
    show("loading");
    try {
      const res = await fetch("/api/package", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ destination, prefs: currentPrefs }),
      });
      const data = await res.json();
      renderPassport(data);
    } catch (e) {
      alert("Couldn't build the passport. Please try again.");
      showDiscover();
    }
  }

  function renderPassport(p) {
    $("passportBanner").innerHTML = p._fallback
      ? '<div class="banner">⚠️ Live AI was unreachable — showing a curated demo passport.</div>' : "";
    const c = p.connect || {};
    const g = p.hidden_gem || {};
    const s = p.story || {};
    const h = p.heritage || {};
    const ev = p.event || {};
    const html = `
      <div class="passport-head">
        <h2>🎟 Cultural Passport · ${esc(p.destination || "")}</h2>
      </div>

      <div class="section">
        <div class="sec-title"><span class="sec-icon">📍</span> Attractions picked for you</div>
        ${(p.attractions||[]).map(a=>`
          <div class="attraction"><b>${esc(a.name)}</b> — <span>${esc(a.why||"")}</span></div>`).join("")}
      </div>

      <div class="section">
        <div class="sec-title"><span class="sec-icon">💎</span> Hidden gem</div>
        <div class="gem"><b>${esc(g.name||"")}</b><br><span>${esc(g.description||"")}</span></div>
      </div>

      <div class="section">
        <div class="sec-title"><span class="sec-icon">📖</span> ${esc(s.title || "An immersive story")}</div>
        <div class="story-narrative">${esc(s.narrative||"")}</div>
      </div>

      <div class="section">
        <div class="sec-title"><span class="sec-icon">🏛</span> ${esc(h.title || "Heritage")}</div>
        <div>${esc(h.significance||"")}</div>
      </div>

      <div class="section">
        <div class="sec-title"><span class="sec-icon">🍛</span> Local food to seek out</div>
        ${(p.food||[]).map(f=>`
          <div class="attraction"><b>${esc(f.dish)}</b> — <span>${esc(f.note||"")}</span></div>`).join("")}
      </div>

      <div class="section">
        <div class="sec-title"><span class="sec-icon">🎉</span> Local event to catch</div>
        <div><b>${esc(ev.name||"")}</b> <span style="color:var(--muted)">· ${esc(ev.when||"")}</span><br>${esc(ev.description||"")}</div>
      </div>

      <div class="section">
        <div class="sec-title"><span class="sec-icon">🎨</span> Today's authentic experience</div>
        <div class="connect-box">
          <b>${esc(c.title||"")}</b>
          ${(c.you_will_learn&&c.you_will_learn.length)?`<ul class="learn-list">${c.you_will_learn.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:""}
          ${c.duration?`<div class="meta-row">⏱ Duration: ${esc(c.duration)}</div>`:""}
          ${c.why_it_matters?`<div class="meta-row">💠 Why it matters: ${esc(c.why_it_matters)}</div>`:""}
          <div class="intro-msg" id="introMsg">${esc(c.intro_message||"")}</div>
          <button class="copy-btn" onclick="copyIntro()">📋 Copy intro message</button>
        </div>
      </div>

      <div class="section">
        <div class="sec-title"><span class="sec-icon">🙏</span> Local etiquette</div>
        <ul class="etq">${(p.etiquette||[]).map(t=>`<li>${esc(t)}</li>`).join("")}</ul>
      </div>

      <div class="section">
        <div class="sec-title"><span class="sec-icon">🗣</span> Basic local phrases</div>
        ${(p.phrases||[]).map(ph=>`
          <div class="phrase"><b>${esc(ph.phrase)}</b> — <span style="color:var(--muted)">${esc(ph.meaning||"")}</span></div>`).join("")}
      </div>

      <div class="section">
        <div class="sec-title"><span class="sec-icon">✨</span> AI travel tip</div>
        <div class="tip-box">${esc(p.ai_tip||"")}</div>
      </div>
    `;
    $("passport").innerHTML = html;
    show("step-passport");
  }

  function copyIntro() {
    const t = $("introMsg").textContent;
    navigator.clipboard.writeText(t).then(() => {
      event.target.textContent = "✓ Copied!";
      setTimeout(() => (event.target.textContent = "📋 Copy intro message"), 1500);
    });
  }

  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[m]));
  }
</script>
</body>
</html>
